services:
  # Node.js application for production
  app:
    container_name: node-app
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    env_file: '.env.production'
    networks:
      - app-network
    volumes:
      # Mount logs directory for production logging
      - logs:/app/logs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

networks:
  app-network:
    driver: bridge

volumes:
  logs:
    # external: true
