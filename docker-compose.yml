services:
  # Node.js application for production
  app:
    container_name: node-app
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    env_file:
      - .env.production
    volumes:
      # Mount logs directory for production logging
      - logs:/app/logs
    restart: unless-stopped
    networks:
      - node-net-prod

networks:
  node-net-prod:
    driver: bridge

volumes:
  logs:
    # external: true
